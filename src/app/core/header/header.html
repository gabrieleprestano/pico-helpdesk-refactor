<header class="fixed top-0 left-0 w-full bg-primary-foreground border-b border-b-border z-50">
  <app-container [className]="'flex items-center justify-between gap-x-2'">
    <!-- Logo -->
    <div class="flex items-center gap-x-0.5">
      <img
        src="/pico_logo.webp"
        alt="Pico logo"
        class="max-w-13 aspect-square object-contain cursor-pointer"
      />
      <h1 class="font-secondary text-2xl">Pico Helpdesk</h1>
    </div>

    <!-- Actions -->
    @if (user()) {
      <div class="flex items-center gap-x-1.5">
        <!-- User -->
        <div class="flex items-center gap-x-3">
          <span
            class="grid place-items-center bg-muted-foreground rounded-full border border-border p-1.5 text-primary-foreground font-medium transition-transform will-change-transform duration-200 ease-in-out cursor-pointer hover:scale-105"
            aria-label="User"
            >{{ userInitials() }}</span
          >

          <div class="hidden sm:flex flex-col">
            <h3 class="text-sm font-medium">{{ userName() }}</h3>
            <small class="text-xs text-muted-foreground">{{ userEmail() }}</small>
          </div>
        </div>
      </div>
    }
  </app-container>
</header>
